name: datetime
description: Dapatkan waktu dan tanggal saat ini, atau konversi waktu antar zona waktu.
parameters:
  - name: timezone
    type: string
    required: false
    description: 'Zona waktu (contoh: Asia/Jakarta, UTC, America/New_York). Default: Asia/Jakarta'
executor:
  type: shell
  command: "date"
