name: web_search
description: Cari informasi di web menggunakan search engine. Gunakan untuk mencari berita terkini, fakta, atau informasi apa pun.
parameters:
  - name: query
    type: string
    required: true
    description: Query pencarian
executor:
  type: http
  url: "https://html.duckduckgo.com/html/?q={{.query}}"
  method: GET
  headers:
    User-Agent: "Mozilla/5.0 (compatible; MaingoBot/1.0)"
